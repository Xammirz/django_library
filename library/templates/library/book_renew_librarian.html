{% extends "base_generic.html" %}
{% load crispy_forms_tags %}
{% block content %}
  <h1>Имя: {{ book_instance.book.title }}</h1>
  <p>Пользователь: {{ user.get_username }}</p>
  <p {% if book_instance.is_overdue %} class="text-danger"{% endif %}>Дата возврата: {{ book_instance.due_back }}</p>

  <form action="" method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <input type="submit" value="Готово!">
  </form>
{% endblock %}
